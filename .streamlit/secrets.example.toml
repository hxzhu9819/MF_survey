# Copy these values into Streamlit Community Cloud secrets.
# Do not commit a real .streamlit/secrets.toml file.

MF_REGISTRY_ADMIN_PASSWORD = "replace-with-a-strong-password"
MF_REGISTRY_IDENTITY_PEPPER = "replace-with-a-long-random-secret"

# Optional. When set, the app writes to Supabase/Postgres instead of local SQLite.
# Prefer the Supabase pooler connection string for hosted Streamlit deployments.
# MF_REGISTRY_DATABASE_URL = "postgresql://postgres.PROJECT_REF:password@aws-0-region.pooler.supabase.com:6543/postgres"
