      它不是为了评价某位医生或某种方案，而是为了理解真实世界中治疗反应和病情反复的节奏。
    why_we_ask: "300 人规模更适合描述治疗路径、缓解持续时间和复发模式，不适合直接证明哪种治疗更好。"
